version: "3.9"

# Projet BDD Nouvelle Génération - Système de gestion de sessions avec Redis
# UGB / IPSL - GELT1

services:
  redis:
    image: redis:7.4-alpine
    container_name: session-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-redispass}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Interface web pour visualiser les clés Redis en temps réel
  # (répond à l'objectif "Visualiser les données en temps réel")
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: session-redis-ui
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379:0:${REDIS_PASSWORD:-redispass}
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data:
    driver: local
